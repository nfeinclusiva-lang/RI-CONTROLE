<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Google Sheets</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Top bar */
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 10px; }
    .top-bar h1 { font-size: 20px; font-weight: 600; color: #1a1a18; }
    .sync-info { font-size: 12px; color: #888780; margin-top: 2px; }
    .btn-refresh { background: #fff; border: 1px solid #d3d1c7; border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; color: #1a1a18; transition: background 0.15s; }
    .btn-refresh:hover { background: #f1efe8; }

    /* Metrics */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .metric-card { background: #fff; border-radius: 10px; border: 1px solid #e8e6df; padding: 16px 18px; }
    .metric-label { font-size: 11px; color: #888780; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .metric-value { font-size: 24px; font-weight: 600; color: #1a1a18; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .metric-sub { font-size: 11px; color: #b4b2a9; margin-top: 3px; }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 2rem; }
    .chart-card { background: #fff; border: 1px solid #e8e6df; border-radius: 12px; padding: 16px 18px; }
    .chart-title { font-size: 12px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px; }

    /* Table section */
    .section-title { font-size: 12px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
    .filters { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select {
      border: 1px solid #d3d1c7; border-radius: 8px; padding: 7px 12px; font-size: 13px;
      background: #fff; color: #1a1a18; outline: none;
    }
    .filters input { flex: 1; min-width: 180px; }
    .filters input:focus, .filters select:focus { border-color: #888780; }
    .filters select { min-width: 140px; }
    .status-bar { font-size: 12px; color: #b4b2a9; margin-bottom: 8px; }
    .table-wrap { overflow-x: auto; border: 1px solid #e8e6df; border-radius: 12px; background: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: #f5f5f3; padding: 10px 14px; text-align: left; font-weight: 500; color: #888780; font-size: 12px; border-bottom: 1px solid #e8e6df; white-space: nowrap; }
    tbody td { padding: 10px 14px; border-bottom: 1px solid #f1efe8; color: #1a1a18; vertical-align: top; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafaf8; }

    /* Pagination */
    .page-controls { display: flex; gap: 8px; align-items: center; font-size: 13px; color: #888780; margin-top: 12px; }
    .page-controls button { background: #fff; border: 1px solid #d3d1c7; border-radius: 8px; padding: 5px 14px; cursor: pointer; color: #1a1a18; font-size: 12px; }
    .page-controls button:disabled { opacity: 0.4; cursor: default; }
    .page-controls button:not(:disabled):hover { background: #f1efe8; }

    /* Loading */
    .loading-box { display: flex; align-items: center; gap: 12px; color: #888780; font-size: 14px; padding: 3rem 0; justify-content: center; }
    .spinner { width: 20px; height: 20px; border: 2px solid #e8e6df; border-top-color: #888780; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box { background: #fff5f5; border: 1px solid #f09595; border-radius: 10px; padding: 14px 18px; color: #a32d2d; font-size: 13px; line-height: 1.6; }

    /* Legend */
    .chart-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; font-size: 11px; color: #888780; }
    .chart-legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div>
      <h1 id="dash-title">Dashboard</h1>
      <div class="sync-info" id="sync-info">Carregando dados...</div>
    </div>
    <button class="btn-refresh" onclick="loadData()">↺ Atualizar</button>
  </div>

  <div id="loading-box" class="loading-box">
    <div class="spinner"></div> Buscando dados da planilha...
  </div>

  <div id="error-box" style="display:none"></div>

  <div id="dashboard-content" style="display:none">
    <div class="metrics-grid" id="metrics-grid"></div>
    <div class="charts-row" id="charts-row"></div>

    <div class="section-title">Dados</div>
    <div class="filters">
      <input type="text" id="search-input" placeholder="Buscar em todas as colunas..." oninput="applyFilters()" />
      <select id="col-filter-select" onchange="onColFilterChange()" style="display:none"></select>
      <select id="col-filter-val" onchange="applyFilters()" style="display:none"></select>
    </div>
    <div class="status-bar" id="status-bar"></div>
    <div class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="page-controls" id="page-controls" style="display:none">
      <button onclick="changePage(-1)" id="btn-prev">← Anterior</button>
      <span id="page-info"></span>
      <button onclick="changePage(1)" id="btn-next">Próxima →</button>
    </div>
  </div>

</div>

<script>
  // ─── CONFIGURAÇÃO ───────────────────────────────────────────────────────────
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3u3PVaORUFqh2jnvRvN9WixGWGwqtaEx1Nt6wviX_PXstOvDD83SxAt0RR4X4C1s1Gl9bpfCqK8fz/pub?gid=1436090432&single=true&output=csv";
  const PROXY   = "https://api.allorigins.win/raw?url=";
  const PAGE_SIZE = 50;
  // ────────────────────────────────────────────────────────────────────────────

  let allRows = [], headers = [], filtered = [], currentPage = 0;
  let chartInstances = [];
  const COLORS = ['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#639922','#BA7517','#E24B4A'];

  // CSV parser
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const parseRow = line => {
      const result = []; let cur = ''; let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      result.push(cur.trim()); return result;
    };
    const hdr = parseRow(lines[0]);
    const rows = lines.slice(1).map(l => {
      const vals = parseRow(l);
      const obj = {};
      hdr.forEach((h, i) => { obj[h] = vals[i] !== undefined ? vals[i] : ''; });
      return obj;
    }).filter(r => Object.values(r).some(v => v !== ''));
    return { headers: hdr, rows };
  }

  function parseNum(v) {
    return parseFloat(String(v).replace(/[R$%,\s]/g, '').replace(',', '.'));
  }

  function isNumericCol(col) {
    const vals = allRows.map(r => r[col]).filter(v => v !== '');
    if (!vals.length) return false;
    return vals.filter(v => !isNaN(parseNum(v))).length / vals.length > 0.7;
  }

  // Metric cards
  function buildMetrics() {
    const grid = document.getElementById('metrics-grid');
    grid.innerHTML = '';
    const numCols = headers.filter(isNumericCol).slice(0, 5);
    const cards = [
      { label: 'Total de registros', value: allRows.length.toLocaleString('pt-BR'), sub: 'linhas na planilha' },
      { label: 'Total de colunas',   value: headers.length, sub: 'campos' }
    ];
    numCols.forEach(col => {
      const nums = allRows.map(r => parseNum(r[col])).filter(v => !isNaN(v));
      if (!nums.length) return;
      const sum = nums.reduce((a, b) => a + b, 0);
      const avg = sum / nums.length;
      const display = sum >= 1e6 ? (sum/1e6).toFixed(1)+'M' : sum >= 1e3 ? (sum/1e3).toFixed(1)+'k' : Math.round(sum).toLocaleString('pt-BR');
      cards.push({ label: col, value: display, sub: 'média: ' + avg.toFixed(1) });
    });
    cards.forEach(c => {
      const d = document.createElement('div'); d.className = 'metric-card';
      d.innerHTML = `<div class="metric-label">${c.label}</div><div class="metric-value">${c.value}</div><div class="metric-sub">${c.sub||''}</div>`;
      grid.appendChild(d);
    });
  }

  // Charts
  function buildCharts() {
    chartInstances.forEach(c => c.destroy()); chartInstances = [];
    const row = document.getElementById('charts-row'); row.innerHTML = '';
    const numCols = headers.filter(isNumericCol);
    const catCols = headers.filter(h => {
      const uniq = new Set(allRows.map(r => r[h])).size;
      return !isNumericCol(h) && uniq >= 2 && uniq <= 20;
    });

    // Bar chart: category x numeric
    if (catCols.length && numCols.length) {
      const cat = catCols[0], num = numCols[0];
      const agg = {};
      allRows.forEach(r => { const k = r[cat]||'(vazio)'; agg[k] = (agg[k]||0) + (parseNum(r[num])||0); });
      const sorted = Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const card = document.createElement('div'); card.className = 'chart-card';
      const h = Math.max(sorted.length * 38 + 60, 200);
      card.innerHTML = `<div class="chart-title">${num} por ${cat}</div><div style="position:relative;height:${h}px"><canvas id="chart-bar" role="img" aria-label="Gráfico de barras ${num} por ${cat}"></canvas></div>`;
      row.appendChild(card);
      chartInstances.push(new Chart(document.getElementById('chart-bar'), {
        type: 'bar',
        data: { labels: sorted.map(e=>e[0]), datasets: [{ label: num, data: sorted.map(e=>Math.round(e[1]*10)/10), backgroundColor: '#378ADD', borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 11 } } }, y: { ticks: { font: { size: 11 } } } } }
      }));
    }

    // Donut chart: distribution of first categorical column
    if (catCols.length) {
      const cat = catCols[0];
      const agg = {};
      allRows.forEach(r => { const k = r[cat]||'(vazio)'; agg[k] = (agg[k]||0)+1; });
      const sorted = Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,8);
      const card = document.createElement('div'); card.className = 'chart-card';
      const legendHTML = sorted.map((e,i)=>`<span><span class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></span>${e[0]} (${e[1]})</span>`).join('');
      card.innerHTML = `<div class="chart-title">Distribuição: ${cat}</div><div style="position:relative;height:200px"><canvas id="chart-donut" role="img" aria-label="Gráfico de rosca distribuição de ${cat}"></canvas></div><div class="chart-legend">${legendHTML}</div>`;
      row.appendChild(card);
      chartInstances.push(new Chart(document.getElementById('chart-donut'), {
        type: 'doughnut',
        data: { labels: sorted.map(e=>e[0]), datasets: [{ data: sorted.map(e=>e[1]), backgroundColor: COLORS }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      }));
    }
  }

  // Column filter
  function buildColFilter() {
    const sel = document.getElementById('col-filter-select');
    const catCols = headers.filter(h => {
      const uniq = new Set(allRows.map(r => r[h])).size;
      return !isNumericCol(h) && uniq >= 2 && uniq <= 30;
    });
    if (!catCols.length) return;
    sel.style.display = '';
    sel.innerHTML = '<option value="">Filtrar por coluna...</option>' + catCols.map(h=>`<option>${h}</option>`).join('');
  }

  function onColFilterChange() {
    const sel = document.getElementById('col-filter-select');
    const val = document.getElementById('col-filter-val');
    const col = sel.value;
    if (!col) { val.style.display = 'none'; val.innerHTML = ''; }
    else {
      val.style.display = '';
      const uniq = [...new Set(allRows.map(r=>r[col]))].filter(Boolean).sort();
      val.innerHTML = '<option value="">Todos</option>' + uniq.map(v=>`<option>${v}</option>`).join('');
    }
    applyFilters();
  }

  // Filter + render
  function applyFilters() {
    const q   = document.getElementById('search-input').value.toLowerCase();
    const col = document.getElementById('col-filter-select').value;
    const val = document.getElementById('col-filter-val').value;
    filtered = allRows.filter(row => {
      const mQ = !q || Object.values(row).some(v => String(v).toLowerCase().includes(q));
      const mF = !col || !val || row[col] === val;
      return mQ && mF;
    });
    currentPage = 0;
    renderTable();
  }

  function renderTable() {
    const head = document.getElementById('table-head');
    const body = document.getElementById('table-body');
    const start = currentPage * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);
    head.innerHTML = '<tr>' + headers.map(h=>`<th>${h}</th>`).join('') + '</tr>';
    body.innerHTML = page.map(row => '<tr>' + headers.map(h=>`<td>${row[h]||''}</td>`).join('') + '</tr>').join('');
    const total = filtered.length;
    document.getElementById('status-bar').textContent = `Exibindo ${Math.min(start+1, total)}–${Math.min(start+PAGE_SIZE, total)} de ${total} registros`;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const pc = document.getElementById('page-controls');
    if (totalPages > 1) {
      pc.style.display = 'flex';
      document.getElementById('page-info').textContent = `Página ${currentPage+1} de ${totalPages}`;
      document.getElementById('btn-prev').disabled = currentPage === 0;
      document.getElementById('btn-next').disabled = currentPage >= totalPages - 1;
    } else { pc.style.display = 'none'; }
  }

  function changePage(dir) { currentPage += dir; renderTable(); }

  // Main loader
  async function loadData() {
    document.getElementById('loading-box').style.display = 'flex';
    document.getElementById('dashboard-content').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('sync-info').textContent = 'Carregando dados...';
    try {
      let text;
      try {
        const r = await fetch(CSV_URL);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        text = await r.text();
      } catch(e) {
        // Fallback via proxy (CORS)
        const r2 = await fetch(PROXY + encodeURIComponent(CSV_URL));
        if (!r2.ok) throw new Error('Proxy falhou: ' + r2.status);
        text = await r2.text();
      }
      const parsed = parseCSV(text);
      headers = parsed.headers; allRows = parsed.rows; filtered = [...allRows];
      buildMetrics();
      buildColFilter();
      buildCharts();
      renderTable();
      document.getElementById('loading-box').style.display = 'none';
      document.getElementById('dashboard-content').style.display = '';
      document.getElementById('dash-title').textContent = 'Dashboard — Google Sheets';
      document.getElementById('sync-info').textContent = 'Atualizado em ' + new Date().toLocaleString('pt-BR') + ' · ' + allRows.length + ' registros';
    } catch(err) {
      document.getElementById('loading-box').style.display = 'none';
      const eb = document.getElementById('error-box');
      eb.style.display = '';
      eb.innerHTML = '<strong>Erro ao carregar dados:</strong> ' + err.message + '<br><small>Verifique se a planilha está publicada como CSV e tente novamente.</small>';
    }
  }

  loadData();
</script>
</body>
</html>

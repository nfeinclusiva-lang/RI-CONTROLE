<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Despesas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

h1 { margin-bottom:20px; }

.cards {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card h3 {
  margin:0;
  font-size:14px;
  color:#666;
}

.card p {
  font-size:18px;
  font-weight:bold;
}

canvas {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:20px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}

th { background:#fafafa; }
</style>
</head>

<body>

<h1>📊 Controle de Despesas</h1>

<div id="status">Carregando...</div>

<div class="cards" id="cards"></div>

<canvas id="grafico"></canvas>

<table>
<thead>
<tr>
<th>Categoria</th>
<th>Orçado</th>
<th>Gasto</th>
<th>Saldo</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/1RT24LIxWB2eboOWrbagZ1hFvE-N0rDJG535EBiynAcE/export?format=csv&gid=1436090432';

// força atualização automática a cada 60s
setInterval(loadData, 60000);

function isValidCSV(t){
  if(!t || t.length < 50) return false;
  const s = t.toLowerCase();
  if(s.includes('<html')) return false;
  if(s.includes('google') && s.includes('drive')) return false;
  return true;
}

function parseCSV(text){
  return text.trim().split('\n').map(l => l.split(','));
}

async function loadData(){
  try{
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();

    if(!isValidCSV(text)) throw new Error();

    const rows = parseCSV(text);

    document.getElementById('status').innerHTML = '✅ Atualizado em ' + new Date().toLocaleTimeString();

    montarDashboard(rows);

  }catch(e){
    document.getElementById('status').innerHTML = '❌ Erro ao carregar dados';
  }
}

function montarDashboard(rows){

  let dados = rows.slice(2,12);

  let totalOrc = 0;
  let totalGas = 0;

  let labels = [];
  let valores = [];

  let tabelaHTML = '';

  dados.forEach(r=>{
    let nome = r[0];
    let orc = parseFloat(r[2]) || 0;
    let gas = parseFloat(r[3]) || 0;
    let sal = orc - gas;

    totalOrc += orc;
    totalGas += gas;

    labels.push(nome);
    valores.push(gas);

    tabelaHTML += `
      <tr>
        <td>${nome}</td>
        <td>R$ ${orc.toFixed(2)}</td>
        <td>R$ ${gas.toFixed(2)}</td>
        <td>R$ ${sal.toFixed(2)}</td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = tabelaHTML;

  document.getElementById('cards').innerHTML = `
    <div class="card"><h3>Orçado</h3><p>R$ ${totalOrc.toFixed(2)}</p></div>
    <div class="card"><h3>Gasto</h3><p>R$ ${totalGas.toFixed(2)}</p></div>
    <div class="card"><h3>Saldo</h3><p>R$ ${(totalOrc-totalGas).toFixed(2)}</p></div>
    <div class="card"><h3>Execução</h3><p>${((totalGas/totalOrc)*100 || 0).toFixed(1)}%</p></div>
  `;

  if(window.grafico) window.grafico.destroy();

  window.grafico = new Chart(document.getElementById('grafico'),{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{
        label:'Gastos',
        data:valores
      }]
    }
  });
}

loadData();
</script>

</body>
</html>

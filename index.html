<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Despesas</title>

<style>
body {
  font-family: Arial;
  background:#f5f6fa;
  padding:20px;
}
h1 { margin-bottom:20px; }

.card {
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.erro {
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Controle de Despesas</h1>
<div id="app">Carregando dados...</div>

<script>
// ================= CONFIG =================
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3u3PVaORUFqh2jnvRvN9WixGWGwqtaEx1Nt6wviX_PXstOvDD83SxAt0RR4X4C1s1Gl9bpfCqK8fz/pub?gid=1436090432&single=true&output=csv';

let dados = [];
let parcelas = [];
let parcelaCols = [];

// ================= FUNÇÕES =================
function normalizar(txt){
  return (txt||'')
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function identificarTipoLinha(texto){
  texto = normalizar(texto);
  if(texto.includes('plano')) return 'orcado';
  if(texto.includes('gasto')) return 'gasto';
  return null;
}

function extrairCategoria(texto){
  texto = normalizar(texto);
  return texto
    .replace(/- plano de trabalho/g,'')
    .replace(/- quanto ja gastou/g,'')
    .replace(/- saldo sobrando/g,'')
    .replace(/- plano/g,'')
    .replace(/- gasto/g,'')
    .trim();
}

function detectarGrupo(cat){
  const c = normalizar(cat);
  if(c.includes('alimentacao')) return 'Alimentação';
  if(c.includes('material')) return 'Material';
  if(c.includes('higiene')) return 'Higiene';
  if(c.includes('custo')) return 'Custos Indiretos';
  if(c.includes('humano')) return 'RH';
  if(c.includes('fgts')||c.includes('inss')||c.includes('irpf')||c.includes('vale')) return 'Encargos';
  if(c.includes('provisao')) return 'Provisão';
  return 'Outros';
}

// ================= CSV CORRETO =================
function parseCSV(text) {
  return text.split('\n').map(line => {
    const result = [];
    let current = '';
    let inQuotes = false;

    for (let char of line) {
      if (char === '"') inQuotes = !inQuotes;
      else if (char === ',' && !inQuotes) {
        result.push(current);
        current = '';
      } else {
        current += char;
      }
    }

    result.push(current);
    return result;
  });
}

function parseVal(v){
  if(!v) return 0;
  return parseFloat(
    v.replace(/R\$/g,'')
     .replace(/\./g,'')
     .replace(',', '.')
  )||0;
}

// ================= PROCESS =================
function processCSV(text){
  const rows = parseCSV(text);

  const header = rows[1];
  parcelas = [];
  parcelaCols = [];

  header.forEach((h,i)=>{
    if(h && h.toLowerCase().includes('parcela')){
      parcelas.push(h);
      parcelaCols.push(i);
    }
  });

  const mapa = {};

  rows.forEach(row=>{
    const titulo = row[0];
    if(!titulo) return;

    const tipo = identificarTipoLinha(titulo);
    if(!tipo) return;

    const categoria = extrairCategoria(titulo);
    if(!categoria) return;

    if(!mapa[categoria]){
      mapa[categoria]={
        grupo: detectarGrupo(categoria),
        nome: categoria,
        orcado:Array(parcelaCols.length).fill(0),
        gasto:Array(parcelaCols.length).fill(0)
      };
    }

    parcelaCols.forEach((ci,idx)=>{
      const val = parseVal(row[ci]);

      if(tipo==='orcado') mapa[categoria].orcado[idx]=val;
      if(tipo==='gasto') mapa[categoria].gasto[idx]=val;
    });
  });

  dados = Object.values(mapa);
}

// ================= RENDER =================
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  if(!dados.length){
    app.innerHTML = '<p class="erro">Nenhum dado encontrado</p>';
    return;
  }

  dados.forEach(d=>{
    const totalOrc = d.orcado.reduce((a,b)=>a+b,0);
    const totalGas = d.gasto.reduce((a,b)=>a+b,0);

    app.innerHTML += `
      <div class="card">
        <strong>${d.nome}</strong><br>
        Grupo: ${d.grupo}<br>
        Orçado: R$ ${totalOrc.toFixed(2)}<br>
        Gasto: R$ ${totalGas.toFixed(2)}<br>
        Saldo: R$ ${(totalOrc-totalGas).toFixed(2)}
      </div>
    `;
  });
}

// ================= LOAD =================
async function loadData(){
  try{
    const res = await fetch(CSV_URL);

    if(!res.ok){
      throw new Error("Erro ao acessar planilha");
    }

    const text = await res.text();

    if(!text || text.length < 50){
      throw new Error("CSV vazio ou inválido");
    }

    processCSV(text);
    render();

  }catch(e){
    document.getElementById('app').innerHTML = `
      <p class="erro">Erro ao carregar dados</p>
      <p>${e.message}</p>
    `;
    console.error(e);
  }
}

// INIT
loadData();
</script>

</body>
</html>

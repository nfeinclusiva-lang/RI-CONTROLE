<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Despesas</title>
</head>
<body>

<h2>Carregando dados...</h2>

<script>
// ✅ CONFIG CORRIGIDA
const APPS_URL = null;

const CSV_URL = 'https://docs.google.com/spreadsheets/d/1RT24LIxWB2eboOWrbagZ1hFvE-N0rDJG535EBiynAcE/export?format=csv&gid=1436090432';

// ✅ VALIDAÇÃO FORTE (ANTI ERRO GOOGLE)
function isValidCSV(t) {
  if (!t || t.length < 50) return false;

  const s = t.toLowerCase();

  if (s.includes('<html')) return false;
  if (s.includes('<!doctype')) return false;
  if (s.includes('google') && s.includes('drive')) return false;
  if (s.includes('accounts.google')) return false;

  if (!s.includes(',')) return false;
  if (s.split('\n').length < 3) return false;

  return true;
}

// ✅ FUNÇÃO PRINCIPAL SIMPLIFICADA
async function loadData() {
  try {
    const response = await fetch(CSV_URL + '&t=' + Date.now());

    if (!response.ok) throw new Error('Erro ao buscar dados');

    const text = await response.text();

    if (!isValidCSV(text)) {
      throw new Error('Resposta inválida (não é CSV)');
    }

    console.log('✅ Dados carregados com sucesso');
    document.body.innerHTML = '<h2>Dados carregados com sucesso ✅</h2>';

  } catch (e) {
    console.error(e);
    document.body.innerHTML = '<h2>Erro ao carregar dados ❌</h2><p>' + e.message + '</p>';
  }
}

// INIT
loadData();
</script>

</body>
</html>

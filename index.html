<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f1f3f8;font-family:Arial,sans-serif;padding:20px;}
.db{background:#f8f9fb;border-radius:12px;padding:16px;}
.tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;}
.tab{padding:5px 11px;border-radius:6px;font-size:11px;cursor:pointer;background:#e5e7eb;color:#6b7280;border:none;font-weight:500;}
.tab.active{background:#2563eb;color:#fff;}
.tab.home{background:#374151;color:#fff;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.mcard{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;}
.mlabel{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.mval{font-size:20px;font-weight:700;color:#111827;}
.mval.green{color:#059669;}
.mval.red{color:#dc2626;}
.msub{font-size:10px;color:#9ca3af;margin-top:3px;}
.charts-row{display:grid;grid-template-columns:1.4fr 1fr;gap:10px;margin-bottom:14px;}
.ccard{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;}
.ctitle{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;font-weight:600;}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.leg span{display:flex;align-items:center;gap:4px;font-size:11px;color:#6b7280;}
.leg-sq{width:9px;height:9px;border-radius:2px;display:inline-block;}
.tcard{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:14px;}
.ttitle{font-size:11px;font-weight:700;color:#374151;margin-bottom:12px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;color:#9ca3af;font-weight:600;font-size:10px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid #f3f4f6;}
td{padding:8px;color:#374151;border-bottom:1px solid #f9fafb;}
.tag-green{background:#d1fae5;color:#065f46;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.tag-red{background:#fee2e2;color:#991b1b;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.tag-blue{background:#dbeafe;color:#1e40af;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.prog-bg{background:#f3f4f6;border-radius:4px;height:6px;overflow:hidden;min-width:80px;}
.prog-bar{height:6px;border-radius:4px;}
.fcard{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:14px;}
.frow{display:grid;grid-template-columns:130px 1fr 1fr 100px;gap:8px;align-items:end;}
.flabel{font-size:10px;color:#9ca3af;margin-bottom:4px;font-weight:600;text-transform:uppercase;}
input,select{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:7px 9px;font-size:12px;color:#374151;background:#f9fafb;outline:none;}
input:focus,select:focus{border-color:#2563eb;background:#fff;}
.btn-launch{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;}
.btn-launch:hover{background:#1d4ed8;}
.badge-manual{background:#ede9fe;color:#5b21b6;padding:2px 7px;border-radius:20px;font-size:10px;}
.del-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:0 4px;}
.donut-legend{margin-top:10px;}
.donut-legend-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#6b7280;padding:3px 0;}
.donut-legend-item span:first-child{display:flex;align-items:center;gap:6px;}
.donut-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.erro-box{background:#fff3f3;border:1px solid #fecaca;border-radius:10px;padding:20px;color:#7f1d1d;font-size:13px;line-height:1.8;}
.erro-box strong{display:block;margin-bottom:8px;font-size:15px;}
.erro-box code{background:#fee2e2;padding:2px 6px;border-radius:4px;font-size:12px;}
@media(max-width:600px){
  .metrics{grid-template-columns:1fr;}
  .charts-row{grid-template-columns:1fr;}
  .frow{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="db">
  <div class="tab-bar" id="tabBar"></div>
  <div id="dashContent"><div style="color:#9ca3af;padding:40px;text-align:center;font-size:14px;">Carregando dados...</div></div>
</div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3u3PVaORUFqh2jnvRvN9WixGWGwqtaEx1Nt6wviX_PXstOvDD83SxAt0RR4X4C1s1Gl9bpfCqK8fz/pub?gid=1436090432&single=true&output=csv';

const PROXIES = [
  url => url,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

const COLORS = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#ec4899','#84cc16'];
let allData = {parcelas:[], categorias:[], lancamentos:[]};
let currentParcela = 0;
let barChart = null, donutChart = null;

function parseCSV(text){
  const rows=[];let cur='',inQ=false,row=[];
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur);cur='';}
    else if(c==='\n'&&!inQ){row.push(cur);rows.push(row);row=[];cur='';}
    else{cur+=c;}
  }
  if(cur)row.push(cur);if(row.length)rows.push(row);
  return rows;
}

function norm(t){return(t||'').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function parseVal(v){if(!v)return 0;return parseFloat(v.replace(/R\$/g,'').replace(/\./g,'').replace(',','.'))||0;}
function fmt(n){return'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtPct(n){return n.toFixed(1)+'%';}

function processCSV(text){
  const rows=parseCSV(text);
  const header=rows.find(r=>r[0]&&r[0].toLowerCase().includes('item'));
  if(!header)return;
  const parcelaCols=[];
  header.forEach((h,i)=>{if(h&&h.toLowerCase().includes('parcela'))parcelaCols.push({idx:i,nome:h.trim()});});
  allData.parcelas=parcelaCols.map(p=>p.nome);
  const mapa={};
  rows.forEach(r=>{
    const titulo=r[0];if(!titulo)return;
    const nt=norm(titulo);
    let tipo=null;
    if(nt.includes('plano'))tipo='orcado';
    else if(nt.includes('gasto'))tipo='gasto';
    if(!tipo)return;
    let cat=nt.replace(/- plano de trabalho/g,'').replace(/- quanto ja gastou/g,'').replace(/- saldo sobrando/g,'').replace(/- plano/g,'').replace(/- gasto/g,'').trim();
    if(!mapa[cat])mapa[cat]={nome:cat,orcado:Array(parcelaCols.length).fill(0),gasto:Array(parcelaCols.length).fill(0)};
    parcelaCols.forEach((p,pi)=>{
      const val=parseVal(r[p.idx]);
      if(tipo==='orcado')mapa[cat].orcado[pi]=val;
      if(tipo==='gasto')mapa[cat].gasto[pi]=val;
    });
  });
  allData.categorias=Object.values(mapa);
}

function getParcelaData(pi){
  return allData.categorias.map(c=>({nome:c.nome,orcado:c.orcado[pi]||0,gasto:c.gasto[pi]||0}));
}
function getSummary(pi){
  const cats=getParcelaData(pi);
  let orc=0,gas=0;
  cats.forEach(c=>{orc+=c.orcado;gas+=c.gasto;});
  return{orc,gas,saldo:orc-gas};
}

function renderTabs(){
  const bar=document.getElementById('tabBar');
  bar.innerHTML='';
  const home=document.createElement('button');
  home.className='tab home';home.textContent='Resumo Geral';
  home.onclick=()=>{currentParcela=0;renderTabs();renderDash();};
  bar.appendChild(home);
  allData.parcelas.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(i===currentParcela?' active':'');
    btn.textContent='P'+(i+1);btn.title=p;
    btn.onclick=()=>{currentParcela=i;renderTabs();renderDash();};
    bar.appendChild(btn);
  });
}

function renderDash(){
  const el=document.getElementById('dashContent');
  const pi=currentParcela;
  const sum=getSummary(pi);
  const cats=getParcelaData(pi);

  el.innerHTML=`
  <div class="metrics">
    <div class="mcard"><div class="mlabel">Total orçado</div><div class="mval">${fmt(sum.orc)}</div><div class="msub">Plano de trabalho</div></div>
    <div class="mcard"><div class="mlabel">Total gasto</div><div class="mval red">${fmt(sum.gas)}</div><div class="msub">Lançamentos registrados</div></div>
    <div class="mcard"><div class="mlabel">Saldo disponível</div><div class="mval ${sum.saldo>=0?'green':'red'}">${fmt(sum.saldo)}</div><div class="msub">Restante a gastar</div></div>
  </div>
  <div class="charts-row">
    <div class="ccard">
      <div class="ctitle">Orçado × Gasto × Saldo por categoria</div>
      <div class="leg">
        <span><span class="leg-sq" style="background:#3b82f6"></span>Orçado</span>
        <span><span class="leg-sq" style="background:#10b981"></span>Gasto</span>
        <span><span class="leg-sq" style="background:#f59e0b"></span>Saldo</span>
      </div>
      <div style="position:relative;height:200px;"><canvas id="barChart" role="img" aria-label="Gráfico de barras orçado vs gasto por categoria"></canvas></div>
    </div>
    <div class="ccard">
      <div class="ctitle">% executado por categoria</div>
      <div style="position:relative;height:140px;"><canvas id="donutChart" role="img" aria-label="Gráfico de rosca percentual por categoria"></canvas></div>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
  <div class="tcard">
    <div class="ttitle">Detalhamento por categoria</div>
    <table>
      <thead><tr><th>Categoria</th><th>Orçado</th><th>Gasto</th><th>Saldo</th><th>% Exec.</th><th>Progresso</th></tr></thead>
      <tbody id="catTableBody"></tbody>
    </table>
  </div>
  <div class="fcard">
    <div class="ttitle">+ Registrar nova despesa <span style="font-size:10px;font-weight:400;color:#9ca3af;">(lançamento manual — não altera a planilha)</span></div>
    <div class="frow">
      <div><div class="flabel">Data</div><input type="date" id="fData" value="${new Date().toISOString().slice(0,10)}"></div>
      <div><div class="flabel">Categoria</div><select id="fCat">${cats.map(c=>`<option>${c.nome}</option>`).join('')}</select></div>
      <div><div class="flabel">Descrição / histórico</div><input type="text" id="fDesc" placeholder="Ex: NF-046497 Atacadão"></div>
      <div><div class="flabel">Valor (R$)</div><input type="number" id="fVal" placeholder="0,00" step="0.01" min="0"></div>
    </div>
    <button class="btn-launch" onclick="lancarDespesa()">Lançar despesa</button>
  </div>
  <div class="tcard">
    <div class="ttitle">Lançamentos desta parcela</div>
    <table>
      <thead><tr><th>Data</th><th>Categoria</th><th>Descrição</th><th>Valor</th><th>Origem</th><th></th></tr></thead>
      <tbody id="lancTableBody"></tbody>
    </table>
  </div>`;

  const catBody=document.getElementById('catTableBody');
  cats.forEach((c,i)=>{
    const saldo=c.orcado-c.gasto;
    const pct=c.orcado>0?(c.gasto/c.orcado*100):0;
    const color=COLORS[i%COLORS.length];
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><strong>${c.nome}</strong></td>
      <td>${fmt(c.orcado)}</td>
      <td><span class="${saldo<0?'tag-red':'tag-blue'}">${fmt(c.gasto)}</span></td>
      <td><span class="${saldo>=0?'tag-green':'tag-red'}">${fmt(saldo)}</span></td>
      <td>${fmtPct(pct)}</td>
      <td><div class="prog-bg"><div class="prog-bar" style="width:${Math.min(pct,100).toFixed(1)}%;background:${pct>100?'#ef4444':color};"></div></div></td>`;
    catBody.appendChild(tr);
  });

  renderLancamentos();

  setTimeout(()=>{
    if(barChart)barChart.destroy();
    if(donutChart)donutChart.destroy();
    const barCtx=document.getElementById('barChart');
    const donutCtx=document.getElementById('donutChart');
    if(barCtx){
      barChart=new Chart(barCtx,{
        type:'bar',
        data:{
          labels:cats.map(c=>c.nome.length>12?c.nome.slice(0,12)+'…':c.nome),
          datasets:[
            {label:'Orçado',data:cats.map(c=>c.orcado),backgroundColor:'#3b82f6',borderRadius:3},
            {label:'Gasto',data:cats.map(c=>c.gasto),backgroundColor:'#10b981',borderRadius:3},
            {label:'Saldo',data:cats.map(c=>Math.max(c.orcado-c.gasto,0)),backgroundColor:'#f59e0b',borderRadius:3}
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)}}},
          scales:{
            x:{grid:{display:false},ticks:{font:{size:9},color:'#9ca3af',autoSkip:false,maxRotation:25}},
            y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:9},color:'#9ca3af',callback:v=>'R$'+(v>=1000?(v/1000).toFixed(0)+'k':v)}}
          }
        }
      });
    }
    if(donutCtx){
      const filtered=cats.filter(c=>c.gasto>0);
      const gastos=filtered.map(c=>c.gasto);
      const labels=filtered.map(c=>c.nome);
      const colors=filtered.map((_,i)=>COLORS[i%COLORS.length]);
      donutChart=new Chart(donutCtx,{
        type:'doughnut',
        data:{labels,datasets:[{data:gastos,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.parsed)}}}}
      });
      const leg=document.getElementById('donutLegend');
      if(leg){
        const total=gastos.reduce((a,b)=>a+b,0);
        leg.innerHTML=labels.map((l,i)=>`<div class="donut-legend-item"><span><span class="donut-dot" style="background:${colors[i]}"></span>${l}</span><span>${total>0?fmtPct(gastos[i]/total*100):'0%'}</span></div>`).join('');
      }
    }
  },50);
}

function renderLancamentos(){
  const body=document.getElementById('lancTableBody');
  if(!body)return;
  body.innerHTML='';
  const lancs=allData.lancamentos.filter(l=>l.parcela===currentParcela);
  if(lancs.length===0){
    body.innerHTML='<tr><td colspan="6" style="color:#9ca3af;text-align:center;padding:16px;">Nenhum lançamento registrado</td></tr>';
    return;
  }
  lancs.forEach(l=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${l.data}</td><td>${l.cat}</td><td>${l.desc||'—'}</td><td style="color:#dc2626;font-weight:600">${fmt(l.val)}</td><td><span class="badge-manual">Manual</span></td><td><button class="del-btn" onclick="deleteLanc(${l.id})">✕</button></td>`;
    body.appendChild(tr);
  });
}

let lancId=0;
function lancarDespesa(){
  const data=document.getElementById('fData').value;
  const cat=document.getElementById('fCat').value;
  const desc=document.getElementById('fDesc').value;
  const val=parseFloat(document.getElementById('fVal').value)||0;
  if(!val||val<=0){alert('Informe um valor válido.');return;}
  allData.lancamentos.push({id:lancId++,parcela:currentParcela,data,cat,desc,val});
  document.getElementById('fVal').value='';
  document.getElementById('fDesc').value='';
  renderLancamentos();
}

function deleteLanc(id){
  allData.lancamentos=allData.lancamentos.filter(l=>l.id!==id);
  renderLancamentos();
}

function mostrarErro(){
  document.getElementById('dashContent').innerHTML=`
  <div class="erro-box">
    <strong>Não foi possível carregar os dados da planilha.</strong>
    O navegador bloqueou a requisição por política de CORS (segurança). Isso é comum ao abrir o arquivo diretamente pelo Explorador de Arquivos (<code>file://</code>).<br><br>
    <strong>Solução mais simples — rodar um servidor local:</strong><br>
    1. Abra o terminal na pasta onde está o arquivo HTML<br>
    2. Execute: <code>npx serve .</code><br>
    3. Acesse <code>http://localhost:3000</code> no navegador<br><br>
    <strong>Alternativa — extensão no Chrome:</strong><br>
    Instale <a href="https://chrome.google.com/webstore/detail/allow-cors/lhobafahddgcelffkeicbaginigeejlf" target="_blank" style="color:#1d4ed8;">Allow CORS: Access-Control-Allow-Origin</a> e recarregue a página.
  </div>`;
}

async function tryFetch(url){
  const res = await fetch(url, {cache:'no-cache'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text = await res.text();
  if(!text || text.trim().length < 20) throw new Error('resposta vazia');
  return text;
}

async function loadData(){
  for(const makeUrl of PROXIES){
    try{
      const url = makeUrl(SHEET_CSV);
      const text = await tryFetch(url);
      processCSV(text);
      if(allData.categorias.length === 0) continue;
      currentParcela = 0;
      renderTabs();
      renderDash();
      return;
    }catch(e){
      console.warn('Tentativa falhou:', e.message);
    }
  }
  mostrarErro();
}

loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f6fa; margin:0; padding:20px; }
h1 { margin-bottom:20px; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:15px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.valor { font-size:20px; font-weight:bold; }
.verde { color:green; }
.vermelho { color:red; }

.top { display:flex; gap:20px; margin-bottom:20px; }
.resumo { flex:1; }

canvas { margin-top:20px; }
</style>
</head>

<body>

<h1>📊 Dashboard Financeiro</h1>

<div class="top">
  <div class="card resumo">
    <h3>Total Orçado</h3>
    <div id="totalOrcado" class="valor">-</div>
  </div>

  <div class="card resumo">
    <h3>Total Gasto</h3>
    <div id="totalGasto" class="valor">-</div>
  </div>

  <div class="card resumo">
    <h3>Saldo</h3>
    <div id="saldoTotal" class="valor">-</div>
  </div>
</div>

<canvas id="grafico"></canvas>

<h2>Categorias</h2>
<div id="app" class="grid"></div>

<script>
// ================= CONFIG =================
const CSV_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vT3u3PVaORUFqh2jnvRvN9WixGWGwqtaEx1Nt6wviX_PXstOvDD83SxAt0RR4X4C1s1Gl9bpfCqK8fz/pub?gid=1436090432&single=true&output=csv');

let dados = [];
let parcelaCols = [];

// ================= CSV CORRETO =================
function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  let row = [];

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      row.push(current);
      current = '';
    } else if (char === '\n' && !inQuotes) {
      row.push(current);
      rows.push(row);
      row = [];
      current = '';
    } else {
      current += char;
    }
  }

  if (current) row.push(current);
  if (row.length) rows.push(row);

  return rows;
}

// ================= UTIL =================
function normalizar(t){
  return (t||'').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function identificarTipoLinha(t){
  t = normalizar(t);
  if(t.includes('plano')) return 'orcado';
  if(t.includes('gasto')) return 'gasto';
  return null;
}

function extrairCategoria(t){
  t = normalizar(t);
  return t
    .replace(/- plano de trabalho/g,'')
    .replace(/- quanto ja gastou/g,'')
    .replace(/- saldo sobrando/g,'')
    .replace(/- plano/g,'')
    .replace(/- gasto/g,'')
    .trim();
}

function parseVal(v){
  if(!v) return 0;
  return parseFloat(v.replace(/R\$/g,'').replace(/\./g,'').replace(',','.'))||0;
}

// ================= PROCESS =================
function processCSV(text){
  const rows = parseCSV(text);

  // encontrar header corretamente
  const header = rows.find(r => r[0] && r[0].toLowerCase().includes('item'));

  if(!header){
    console.error("Header não encontrado");
    return;
  }

  parcelaCols = [];
  header.forEach((h,i)=>{
    if(h && h.toLowerCase().includes('parcela')){
      parcelaCols.push(i);
    }
  });

  const mapa = {};

  rows.forEach(r=>{
    const titulo = r[0];
    if(!titulo) return;

    const tipo = identificarTipoLinha(titulo);
    if(!tipo) return;

    const cat = extrairCategoria(titulo);

    if(!mapa[cat]){
      mapa[cat] = {
        nome: cat,
        orcado: Array(parcelaCols.length).fill(0),
        gasto: Array(parcelaCols.length).fill(0)
      };
    }

    parcelaCols.forEach((ci,idx)=>{
      const val = parseVal(r[ci]);

      if(tipo==='orcado') mapa[cat].orcado[idx]=val;
      if(tipo==='gasto') mapa[cat].gasto[idx]=val;
    });
  });

  dados = Object.values(mapa);
}

// ================= RENDER =================
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  let totalOrc = 0;
  let totalGas = 0;

  const labels = [];
  const valores = [];

  dados.forEach(d=>{
    const orc = d.orcado.reduce((a,b)=>a+b,0);
    const gas = d.gasto.reduce((a,b)=>a+b,0);
    const saldo = orc - gas;

    totalOrc += orc;
    totalGas += gas;

    labels.push(d.nome);
    valores.push(gas);

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <strong>${d.nome}</strong><br>
      Orçado: R$ ${orc.toFixed(2)}<br>
      Gasto: R$ ${gas.toFixed(2)}<br>
      <span class="${saldo>=0?'verde':'vermelho'}">
        Saldo: R$ ${saldo.toFixed(2)}
      </span>
    `;

    app.appendChild(div);
  });

  document.getElementById('totalOrcado').innerText = 'R$ ' + totalOrc.toFixed(2);
  document.getElementById('totalGasto').innerText = 'R$ ' + totalGas.toFixed(2);

  const saldoTotal = totalOrc - totalGas;
  const saldoEl = document.getElementById('saldoTotal');
  saldoEl.innerText = 'R$ ' + saldoTotal.toFixed(2);
  saldoEl.className = 'valor ' + (saldoTotal>=0?'verde':'vermelho');

  new Chart(document.getElementById('grafico'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Gastos',
        data: valores
      }]
    }
  });
}

// ================= LOAD =================
async function loadData(){
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();

    processCSV(text);
    render();

  }catch(e){
    document.body.innerHTML = "<h2>Erro ao carregar dados</h2>";
    console.error(e);
  }
}

loadData();
</script>

</body>
</html>

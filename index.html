<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Despesas</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:#fff; padding:20px; border-radius:10px; margin-bottom:10px; }
</style>
</head>

<body>

<h2>Controle de Despesas</h2>
<div id="status">Carregando...</div>
<div id="dados"></div>

<script>
// ✅ CONFIG FINAL CORRIGIDA
const CSV_URL = 'https://docs.google.com/spreadsheets/d/1RT24LIxWB2eboOWrbagZ1hFvE-N0rDJG535EBiynAcE/export?format=csv&gid=1436090432';

// ✅ VALIDAÇÃO ANTI ERRO GOOGLE
function isValidCSV(t) {
  if (!t || t.length < 50) return false;

  const s = t.toLowerCase();

  if (s.includes('<html')) return false;
  if (s.includes('google') && s.includes('drive')) return false;

  if (!s.includes(',')) return false;
  if (s.split('\n').length < 3) return false;

  return true;
}

// ✅ PARSER CSV
function parseCSV(text) {
  return text.trim().split('\n').map(l => l.split(','));
}

// ✅ LOAD PRINCIPAL
async function loadData() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());

    if (!res.ok) throw new Error('Erro ao buscar');

    const text = await res.text();

    if (!isValidCSV(text)) {
      throw new Error('Resposta inválida');
    }

    const rows = parseCSV(text);

    document.getElementById('status').innerHTML = '✅ Dados carregados';

    render(rows);

  } catch (e) {
    document.getElementById('status').innerHTML =
      '❌ Erro: ' + e.message;
  }
}

// ✅ RENDER SIMPLES (FUNCIONANDO)
function render(rows) {
  let html = '';

  rows.slice(0, 15).forEach((r, i) => {
    html += `<div class="card">${r.join(' | ')}</div>`;
  });

  document.getElementById('dados').innerHTML = html;
}

// INIT
loadData();
</script>

</body>
</html>
